kind = "mobile"
previewPath = "/"
title = "ymusic"
version = "1.0.0"
id = "artifacts/ymusic"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 19688

[services.development]
run = "pnpm --filter @workspace/ymusic run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ymusic", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/ymusic", "run", "serve" ]

[services.env]
PORT = "19688"
BASE_PATH = "/"
